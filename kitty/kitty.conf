# Kitty config ported from KDE Konsole (Profile 1).
# Symlinked to ~/.config/kitty/kitty.conf by ./sync. See CLAUDE.md for the mapping.
#
# The palette below is Konsole's Breeze color scheme (~/.local/share/konsole/
# Breeze.colorscheme), ported verbatim: kitty color0-7 = Breeze's normal colors,
# color8-15 = Breeze's Intense variants (which Konsole renders for bold text).
# Profile 1 names no ColorScheme, but Konsole's fallback default IS Breeze — an
# on-screen color picker confirmed Konsole paints these exact values (e.g. bold
# blue #3daee9 = Breeze Color4Intense). An earlier OSC-query capture had reported
# a different (built-in) table that Konsole does NOT actually render; the picker
# and this scheme file are the ground truth, not the OSC query.

# --- Font (Konsole Profile 1: Hack, 11pt) ---
# Hack Nerd Font is a drop-in superset of Hack: identical glyph shapes plus the
# Private Use Area icons that Neovim plugins (neo-tree, telescope, web-devicons,
# which-key) render. Installed under ~/.local/share/fonts/HackNerdFont/.
font_family      Hack Nerd Font
font_size        11.0

# --- Window: remember last size, mirroring Konsole's per-screen geometry ---
remember_window_size   yes

# --- Tab bar (Konsole TabBarPosition=Bottom) ---
tab_bar_edge     bottom
# Flat tabs split by a thin separator, matching Konsole's understated bar.
tab_bar_style    separator
# Title = the foreground program name (bash, nvim, ssh), like Konsole's tabs.
# {tab.active_exe} is the basename of the active window's process; this overrides
# the shell-integration title (which would show cwd at the prompt) so the tab is
# always the running command. NOTE: the bar only appears with >=2 tabs
# (tab_bar_min_tabs defaults to 2); open one with ctrl+shift+t.
tab_title_template "{index}: {tab.active_exe}"

# Tab navigation on shift+arrows (kitty's ctrl+shift+arrows still work too).
map shift+right  next_tab
map shift+left   previous_tab

# New tabs inherit the active tab's cwd (default ctrl+shift+t uses kitty's launch dir).
map ctrl+shift+t new_tab_with_cwd

# --- Background transparency (to match Konsole's translucent window) ---
background_opacity   0.7
background_blur      0

# --- Colors: Konsole's Breeze scheme, ported from Breeze.colorscheme ---
foreground   #fcfcfc
background   #232627

# normal (Breeze Color0-7)
color0   #232627
color1   #ed1515
color2   #11d116
color3   #f67400
color4   #1d99f3
color5   #9b59b6
color6   #1abc9c
color7   #fcfcfc
# bright (Breeze Color0-7 Intense — what Konsole renders for bold text)
color8   #7f8c8d
color9   #c0392b
color10  #1cdc9a
color11  #fdbc4b
color12  #3daee9
color13  #8e44ad
color14  #16a085
color15  #ffffff
